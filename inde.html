<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC GN</title>
    <style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        background:linear-gradient(to right, rgb(29, 136, 207), rgb(110, 25, 143));
        text-align: center;
        color: #fff;
    }
    .container{
        position: absolute;
        top: 50%;
        left: 50%;
      transform: translate(-50%, -50%);
      width: 50%;
      background-color: rgba(0, 0, 0, 0.5);
      padding: 1em;
      border-radius: 10px;

    }

    button{
        background-color: slateblue;
        color: #fff;
        border: none;
        padding: 1rem;
        border-radius: 10px;
        box-shadow:1px 1px 6px black;
        cursor: pointer;
    }  

    button:hover{
        background-color: steelblue;
    }
   .final-step, 
   .second-step {
        display: none;
    }
    input{
        padding: 5px;
        border-radius: 5px;
        border: none;
       outline: none;
    }
</style>
</head>
<body>
    <h1>Gustavo Netzke</h1>
    <div class="container">
        <div class="first-step">
            <p>clique no botão para calcular o seu IMC</p>
            <button onclick="go(1,2)">Iniciar</button>
        </div>
        <div class="second-step">
            <h3>Calculadora IMC</h3>
            <hr>
            <label for="">Digite seu peso:</label>
            <input type="number" placeholder="seu peso" id="peso">
            <br><br>
            <label for="">Digite sua altura</label>
            <input type="number" placeholder="sua altura" id="altura">
            <br><br>
            <button onclick="validate()">Calcular</button>
        </div>
        <div class="final-step">
            <h3>Resultado!</h3>
            <p id="resultado">...</p>
            <button>Calcular novamente</button>
            <button>finalizar</button>
        </div>
    </div>
    <script>
        const firstDiv = document.querySelector('.first-step');
        const secondDiv = document.querySelector('.second-step');
        const finalDiv = document.querySelector('.final-step');
        
        function go(currentStep,nextStep)
        {
            let dNone, dBlock;
            if(currentStep == 1)
            {
                dNone = firstDiv;
            }
            else if (currentStep == 2)
            {
               dNone = secondDiv;
            }
            else
            {
                dNone =  finalDiv;
            }

            dNone.style.display = 'none';

             if(nextStep == 1)
            {
                 dBlock = firstDiv;
            }
            else if (nextStep == 2)
            {
                dBlock = secondDiv;
            }
            else
            {
                 dBlock =  finalDiv;
            }
             dBlock.style.display = 'block';
        }

        function validate()
        {
            const peso = document.getElementById('peso');
            const altura = document.getElementById('altura');
            if(!peso.value || !altura.value)
            {
                if(!peso.value && !altura.value)
                {
                      console.log('náo tem nem o peso, nem a altura');
                }
                else if(!peso.value)
                {
                      console.log('não tem peso')
                }
                else(!altura.value)
                {
                      console.log('não tem altura')
                }
            }
            else
            {
                console.log('tudo ok! calcular');
            }
      
        }
        
    </script>


        </div>
        <div class="fianl-step"></div>
    </div>
</body>
</html>
